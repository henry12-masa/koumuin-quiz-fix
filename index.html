<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="公務員試験の教養・専門科目を200問から50問ランダム出題で学べる無料クイズサイト。数的推理、判断推理、憲法、民法、行政法、経済、時事対策に対応。" />
  <title>公務員試験クイズ問題集｜200問ランダム50問</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <p class="badge">公務員試験対策</p>
      <h1>公務員試験クイズ問題集</h1>
      <p>教養試験・専門試験を200問からランダム50問で対策。回答すると自動で次の問題へ進みます。</p>
    </div>
  </header>

  <main class="layout container">
    <aside class="ad ad-left" aria-label="広告左">
      <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802" crossorigin="anonymous"></script>
      <!-- チェス -->
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8398161859137802" data-ad-slot="5599163841" data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </aside>

    <section class="quiz-card">
      <div id="startScreen">
        <h2>ジャンルを選択</h2>
        <p class="lead">全分野ミックス、または科目別に出題できます。</p>
        <div id="categoryButtons" class="category-grid"></div>
        <div class="settings">
          <button id="startAllBtn" class="primary">全分野ミックスで開始</button>
        </div>
      </div>

      <div id="quizScreen" class="hidden">
        <div class="quiz-top">
          <span id="categoryLabel"></span>
          <span id="progressLabel"></span>
        </div>
        <div class="bar"><div id="progressBar"></div></div>
        <h2 id="questionText"></h2>
        <div id="choices" class="choices"></div>
        <div id="resultBox" class="result-box hidden"></div>
      </div>

      <div id="finishScreen" class="hidden">
        <h2>結果</h2>
        <p id="scoreText" class="score"></p>
        <p id="commentText"></p>
        <button id="restartBtn" class="primary">もう一度挑戦する</button>
      </div>
    </section>

    <aside class="ad ad-right" aria-label="広告右">
      <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802" crossorigin="anonymous"></script>
      <!-- チェス -->
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8398161859137802" data-ad-slot="5599163841" data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </aside>
  </main>

  <footer class="site-footer">
    <div class="container">© 公務員試験クイズ問題集</div>
  </footer>
  <script src="questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
